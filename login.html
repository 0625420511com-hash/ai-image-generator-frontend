<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Image Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="logo">✦ AI Image Generator</div>
    <div class="header-right"></div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Left: Form Panel -->
    <div class="form-panel">
      <div class="panel">
        <div class="panel-title">สร้างรูปภาพ</div>

        <div class="form-group">
          <label for="prompt">Prompt</label>
          <textarea id="prompt"
            placeholder="อธิบายรูปที่ต้องการ เช่น: a futuristic city at night, neon lights, cinematic..."></textarea>
        </div>

        <div class="form-group">
          <label for="model-select">โมเดล AI</label>
          <select id="model-select" id="model-select-fix">
            <option value="pollinations">Pollinations AI (ฟรี, เร็ว)</option>
            <option value="gemini">Gemini (Google)</option>
            <option value="stable-diffusion">Stable Diffusion (HuggingFace)</option>
            <option value="seaart">SeaArt <span class="badge badge-external">เปิดเว็บภายนอก</span></option>
          </select>
        </div>

        <div id="seaart-note"
          style="display:none; font-size:0.8rem; color:var(--accent2); margin-top:-8px; margin-bottom:12px;">
          🎨 SeaArt จะ copy prompt และเปิดเว็บใหม่ให้อัตโนมัติ
        </div>

        <div class="form-group">
          <label for="aspect-ratio">Aspect Ratio</label>
          <select id="aspect-ratio">
            <option value="1:1">1:1 — Square</option>
            <option value="16:9">16:9 — Landscape</option>
            <option value="9:16">9:16 — Portrait</option>
            <option value="4:3">4:3 — Standard</option>
            <option value="3:4">3:4 — Portrait Standard</option>
          </select>
        </div>

        <button class="btn-generate" id="generate-btn">
          <div class="spinner" id="spinner"></div>
          <span id="btn-text">✦ สร้างรูป</span>
        </button>
      </div>
    </div>

    <!-- Right: Result + History -->
    <div class="result-panel">

      <!-- Image Preview -->
      <div class="panel" style="padding:0; overflow:hidden;">
        <div class="image-preview">
          <div class="image-placeholder" id="image-placeholder">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <circle cx="8.5" cy="8.5" r="1.5" />
              <polyline points="21 15 16 10 5 21" />
            </svg>
            <p>รูปภาพจะปรากฏที่นี่</p>
          </div>
          <img id="result-img" alt="Generated image" />
          <div class="image-actions" id="image-actions">
            <button class="btn btn-primary">⬇ Download</button>
          </div>
        </div>
      </div>

      <!-- History -->
      <div class="panel">
        <div class="panel-title">ประวัติการสร้าง</div>
        <div class="history-grid" id="history-grid">
          <p class="empty-history">กำลังโหลด...</p>
        </div>
      </div>

    </div>
  </main>

  <div class="toast" id="toast"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
  <script src="js/adapters/gemini.js"></script>
  <script src="js/adapters/pollinations.js"></script>
  <script src="js/adapters/stable-diffusion.js"></script>
  <script src="js/adapters/seaart.js"></script>
  <script src="js/history.js"></script>
  <script src="js/generate.js"></script>

  <script>
    // Bind event listeners
    document.getElementById('generate-btn').addEventListener('click', handleGenerate);
    document.getElementById('model-select').addEventListener('change', handleModelChange);
    document.getElementById('download-btn') && document.getElementById('download-btn').addEventListener('click', handleDownload);

    // Init: load history directly (no auth required)
    (async () => {
      await refreshHistory();
    })();
  </script>
</body>

</html>
